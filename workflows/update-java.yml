name: update-java
on:
  schedule:
    - cron: "0 3 * * *"
  push:
    branches:
      - ci/auto-update-java
      - ci/auto-update
jobs:
  update-java:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      packages: read
    env:
      ORG_GRADLE_PROJECT_ghUsername: ${{ secrets.GITHUB_ACTOR }}
      ORG_GRADLE_PROJECT_ghPassword: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.ref }}
          filter: "blob:none"
          fetch-depth: 0
      - uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v5.0.0
        with:
          gradle-version: current
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
      - run: gradle wrapper --write-locks
        name: set new wrapper
      - run: find . -name '*gradle.lockfile' -delete
        name: clean locks # because we need to regenerate all of them
      - run: ./gradlew wrapper --write-locks
        name: download wrapper and write its locks
      - run: ./gradlew wrapper
        name: update gradle wrapper shell scripts
      - run: ./gradlew dependencies --write-locks
        name: write locks for most dependencies
      - run: ./gradlew build --write-locks
        name: catch any tasks that are run during build that have defined their own dependencies # like spotless
