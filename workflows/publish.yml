name: publish
on:
  workflow_run:
    workflows: [full]
    types: [completed]
    branches:
      - "**"
      - "!renovate/**"
      - "!deps/**"
jobs:
  publish:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: write
      packages: write
    env:
      IS_PUBLISHING: true
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}
          filter: "blob:none"
          fetch-depth: 0
      - run: git remote set-head --auto origin
      - uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v5.0.0
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
      - run: ./gradlew publishAllPublicationsToGhRepository --info
        env:
          ORG_GRADLE_PROJECT_ghUsername: ${{ github.actor }}
          ORG_GRADLE_PROJECT_ghPassword: ${{ github.token }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_SECRET_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_PASSPHRASE }}
      - name: Detect tag for Maven Central publishing
        id: detect-tag
        run: |
          TAGS=$(git tag --points-at HEAD | head -n1)
          if [ -n "$TAGS" ]; then
            echo "is_tag=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_tag=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Release on GitHub
        run: |
          ./gradlew publishAllPublicationsToStagingRepository
          export STAGING=$(printf "%s" $(./gradlew stagingPath --quiet))
          gh release create ${{ github.event.workflow_run.head_branch }} --generate-notes $STAGING/* --verify-tag
        if: ${{ steps.detect-tag.outputs.is_tag == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_SECRET_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_PASSPHRASE }}
      - run: ./gradlew publishToMavenCentral --info
        if: ${{ steps.detect-tag.outputs.is_tag == 'true' }}
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.CENTRAL_USER }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.CENTRAL_PASS }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_SECRET_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_PASSPHRASE }}
