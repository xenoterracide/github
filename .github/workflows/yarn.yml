name: yarn
on: [workflow_call]
jobs:
  check:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24.17.0
          package-manager-cache: false
      - run: corepack enable
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24.17.0
          cache: "yarn"
      - run: yarn install --immutable --inline-builds --check-resolutions
      - run: yarn check
