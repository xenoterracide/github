name: update-java
on:
  workflow_call:
    secrets:
      gradle_encryption_key:
        required: true
      merge_pat:
        required: true
jobs:
  update:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      packages: read
    env:
      ORG_GRADLE_PROJECT_ghUsername: ${{ github.actor }}
      ORG_GRADLE_PROJECT_ghPassword: ${{ github.token }}
    steps:
      - &checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.ref }}
          filter: "blob:none"
          fetch-depth: 0
      - uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v5.0.2
        with:
          gradle-version: current
          cache-encryption-key: ${{ secrets.gradle_encryption_key }}
      - run: gradle wrapper --write-locks
        name: set new wrapper
      - run: find . -name '*gradle.lockfile' -delete
        name: clean locks # because we need to regenerate all of them
      - run: ./gradlew wrapper --write-locks
        name: download wrapper and write its locks
      - run: ./gradlew wrapper
        name: update gradle wrapper shell scripts
      - run: ./gradlew dependencies --write-locks
        name: write locks for most dependencies
      - run: ./gradlew build --write-locks
        name: catch any tasks that are run during build that have defined their own dependencies # like spotless
      - uses: peter-evans/create-pull-request@v8.1.0
        id: create_pr
        with:
          title: "chore(deps): java"
          branch: deps/update-java
          token: ${{ secrets.merge_pat }}
      - run: gh pr merge --auto --squash ${{ steps.create_pr.outputs.pull-request-number }}
        if: ${{ steps.create_pr.outputs.pull-request-number != '' }}
        env:
          GH_TOKEN: ${{ secrets.merge_pat }}
