name: ktlint
on: [workflow_call]
jobs:
  check:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: 21
      - uses: asdf-vm/actions/install@v4.0.1
      - run: ktlint '*.gradle.kts' '**/*.gradle.kts'
